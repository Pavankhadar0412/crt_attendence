<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CRT Attendence</title>
    <!-- Vercel Analytics -->
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        .login-container h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
        }

        .error-message {
            color: #e74c3c;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }

        .success-message {
            color: #27ae60;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }

        .info-text {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .disclaimer-text {
            text-align: center;
            margin-top: 15px;
            color: #e74c3c;
            font-size: 12px;
            font-weight: 500;
            padding: 10px;
            background: #fff3f3;
            border-radius: 5px;
            border-left: 4px solid #e74c3c;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>CRT Attendence</h1>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">ID Number</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="login-btn">Login</button>
        </form>
        <div class="error-message" id="errorMessage">Username and password must be the same!</div>
        <div class="success-message" id="successMessage">Login successful! Redirecting...</div>
        <p class="info-text">Note: Username and password should be your ID number (ID must start with 23, e.g., 2300031031)</p>
        <p class="disclaimer-text">⚠️ Disclaimer: This website is not handled by KL University. It is handled by Y23 students.</p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            
            // Reset messages
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            
            // Check if username and password are the same and if username starts with 23
            if (username === password && username !== '' && username.startsWith('23')) {
                successMessage.style.display = 'block';
                // Store login state
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('username', username);
                
                // Redirect to dashboard after 1 second
                setTimeout(function() {
                    window.location.href = 'dashboard.html';
                }, 1000);
            } else if (!username.startsWith('23')) {
                errorMessage.textContent = 'Access denied: ID number must start with 23!';
                errorMessage.style.display = 'block';
            } else {
                errorMessage.textContent = 'ID number and password must be the same!';
                errorMessage.style.display = 'block';
            }
        });
    </script>
</body>
</html>
